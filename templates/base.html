{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Abrar Portfolio{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

    {% include 'components/navbar.html' %}

    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>

    <!-- ✅ Footer Block (Now Inheritable) -->
    {% block footer %}
    <footer class="bg-dark text-white text-center py-4 mt-5">
        <div class="container">

            <div class="mb-3 icons">
                <a href="https://linkedin.com/in/abraralam2004" target="_blank" class="text-white me-3">
                    <i class="fa-brands fa-linkedin fa-lg"></i>
                </a>

                <a href="https://github.com/MohammadAbrarAlam" target="_blank" class="text-white me-3">
                    <i class="fa-brands fa-github fa-lg"></i>
                </a>

                <a href="https://system-protector.onrender.com/" target="_blank" class="text-white">
                    <i class="fa-solid fa-globe fa-lg"></i>
                </a>
            </div>

            <p class="mb-0">
                © {% now "Y" %} Abrar Alam | Built with Django 🚀
            </p>

        </div>
    </footer>
    {% endblock %}

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="{% static 'js/main.js' %}"></script>

</body>
</html>
